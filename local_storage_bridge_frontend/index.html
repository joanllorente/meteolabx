<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Local Storage Bridge</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 0;
        overflow: hidden;
        background: transparent;
      }
    </style>
  </head>
  <body>
    <script>
      (function () {
        let lastPayload = "";

        function sendMessage(type, payload) {
          const message = Object.assign(
            {
              isStreamlitMessage: true,
              type: type,
            },
            payload || {}
          );
          window.parent.postMessage(message, "*");
        }

        function setComponentValue(value) {
          sendMessage("streamlit:setComponentValue", { value: value });
        }

        function setFrameHeight(height) {
          sendMessage("streamlit:setFrameHeight", { height: height });
        }

        function componentReady() {
          sendMessage("streamlit:componentReady", { apiVersion: 1 });
        }

        function normalizeScalar(value) {
          if (value === undefined || value === null) return "";
          if (typeof value === "boolean") return value ? "1" : "0";
          if (typeof value === "number") return String(value);
          return String(value);
        }

        function unwrapValue(value, key) {
          if (value === undefined || value === null) return "";
          if (
            value &&
            typeof value === "object" &&
            !Array.isArray(value)
          ) {
            if (Object.prototype.hasOwnProperty.call(value, key)) {
              return unwrapValue(value[key], key);
            }
            const values = Object.values(value);
            if (values.length === 1) {
              return unwrapValue(values[0], key);
            }
            return "";
          }
          return normalizeScalar(value);
        }

        function unwrapStoredValue(key) {
          let raw = null;
          try {
            raw = window.localStorage.getItem(key);
          } catch (_e) {
            return "";
          }
          if (raw === null || raw === undefined) return "";
          try {
            const parsed = JSON.parse(raw);
            if (
              parsed &&
              typeof parsed === "object" &&
              !Array.isArray(parsed)
            ) {
              if (Object.prototype.hasOwnProperty.call(parsed, key)) {
                return unwrapValue(parsed[key], key);
              }
              const values = Object.values(parsed);
              if (values.length === 1) {
                return unwrapValue(values[0], key);
              }
            }
            return unwrapValue(parsed, key);
          } catch (_e) {
            return normalizeScalar(raw);
          }
        }

        function setStoredValue(key, value) {
          try {
            const payload = {};
            payload[key] = value;
            window.localStorage.setItem(key, JSON.stringify(payload));
          } catch (_e) {}
        }

        function readValues(keys) {
          const values = {};
          keys.forEach(function (key) {
            if (!key) return;
            values[key] = unwrapStoredValue(String(key));
          });
          return values;
        }

        function onRender(event) {
          const data = event.data;
          if (!data || data.type !== "streamlit:render") {
            return;
          }

          const args = data.args || {};
          const keys = Array.isArray(args.keys) ? args.keys.map(String) : [];
          const writes =
            args.writes && typeof args.writes === "object" ? args.writes : {};
          const shouldEmit = args.emit !== false;

          Object.keys(writes).forEach(function (key) {
            setStoredValue(key, writes[key]);
          });

          if (!shouldEmit) {
            setFrameHeight(0);
            return;
          }

          const payload = {
            ready: true,
            values: readValues(keys),
            source: "local_storage_bridge",
          };
          const serialized = JSON.stringify(payload);
          if (serialized !== lastPayload) {
            lastPayload = serialized;
            setComponentValue(payload);
          }
          setFrameHeight(0);
        }

        window.addEventListener("message", onRender);
        componentReady();
        setFrameHeight(0);
      })();
    </script>
  </body>
</html>
